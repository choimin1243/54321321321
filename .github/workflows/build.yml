name: Build HWPX Merger EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed hwpx_merger.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hwpx-merger-exe
        path: dist/hwpx_merger.exe
